name: Sync IG Reels

on:
  # 每天台灣時間 09:00 自動跑（UTC 01:00）
  schedule:
    - cron: "0 1 * * *"
  # 也可以在 GitHub Actions 頁面手動觸發
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Run sync script
        id: sync
        run: python3 scripts/sync-ig-reels.py

      - name: Commit & push if changed
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/reels/ src/components/WorkVideo.tsx
          git commit -m "chore: auto-sync IG reels [$(date +'%Y-%m-%d')]"
          git push
